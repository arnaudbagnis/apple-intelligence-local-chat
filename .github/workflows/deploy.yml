name: Build and Release DMG

on:
  push:
    tags:
      - 'v*' # Se lance lors de la création d'un tag comme v1.0.0
  workflow_dispatch: # Permet de lancer le workflow manuellement depuis GitHub

jobs:
  build:
    runs-on: macos-14 # macOS 14 est recommandé pour les versions récentes de Xcode

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build Xcode Project
        run: |
          xcodebuild clean build \
            -project LocalChat.xcodeproj \
            -scheme LocalChat \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          
      - name: Create DMG
        run: |
          mkdir -p dist
          # On génère le .dmg à partir du .app produit dans le dossier build
          create-dmg \
            --volname "LocalChat" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "LocalChat.app" 150 190 \
            --hide-extension "LocalChat.app" \
            --app-drop-link 450 185 \
            "dist/LocalChat.dmg" \
            "build/Build/Products/Release/LocalChat.app"

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalChat-App
          path: dist/LocalChat.dmg

      - name: Release DMG (only on tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/LocalChat.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
